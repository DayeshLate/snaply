spring.application.name=snaply-backend
spring.config.import=optional:file:.env[.properties]
server.port=8080
app.frontend.url=

# # MySQL Configuration 
# spring.datasource.url=jdbc:mysql://localhost:3306/moneymanagement
# spring.datasource.username=${DB_USERNAME}
# spring.datasource.password=${DB_PASSWORD}


Supabase Pooler Connection
spring.datasource.url=jdbc:postgresql://${PGHOST}:${PGPORT}/${PGDATABASE}?sslmode=require
spring.datasource.username=${PGUSER}
spring.datasource.password=${PGPASSWORD}
spring.datasource.driver-class-name=org.postgresql.Driver


# JPA / Hibernate
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect

# Redis

spring.data.redis.host=localhost
spring.data.redis.port=6379
spring.data.redis.password=
spring.data.redis.timeout=6000

# OAuth2 Google

spring.security.oauth2.client.registration.google.client-id=
spring.security.oauth2.client.registration.google.client-secret=
spring.security.oauth2.client.registration.google.scope=
spring.security.oauth2.client.registration.google.redirect-uri=
spring.security.oauth2.client.registration.google.authorization-grant-type=
spring.security.oauth2.client.registration.google.client-name=Google


# JWT
jwt.secret=
jwt.expiration=86400000

# File Upload
spring.servlet.multipart.max-file-size=50MB
spring.servlet.multipart.max-request-size=50MB


# Logging

logging.level.org.springframework.security=DEBUG
logging.level.org.springframework.web=INFO
